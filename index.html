<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ermak X — Авторизация через Яндекс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0e1a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            padding: 44px 32px 32px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(123, 47, 252, 0.2);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: 0.3s;
        }

        /* Анимированная обводка */
        .container::before {
            content: '';
            position: absolute;
            inset: -1.5px;
            border-radius: 50px;
            padding: 2px;
            background: conic-gradient(from var(--angle, 0deg),
                    transparent 0%,
                    #7b2ffc 20%,
                    #a855f7 40%,
                    #c084fc 60%,
                    #a855f7 80%,
                    #7b2ffc 100%,
                    transparent 100%);
            background-size: 300% 300%;
            animation: borderSpin 8s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: -1;
        }
        .container {
            position: relative;
            overflow: hidden;
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes borderSpin {
            0% {
                --angle: 0deg;
            }
            100% {
                --angle: 360deg;
            }
        }

        /* Логотип */
        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #7b2ffc, #a855f7, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.25);
            font-size: 13px;
            margin-bottom: 28px;
            font-weight: 400;
        }

        /* Бейдж */
        .badge {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(252, 63, 29, 0.15);
            color: #fc3f1d;
            margin-bottom: 20px;
            border: 1px solid rgba(252, 63, 29, 0.1);
        }

        .badge.success {
            background: rgba(74, 222, 128, 0.12);
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.15);
        }

        /* Сообщение */
        .message {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .message strong {
            color: #fff;
            font-weight: 600;
        }

        /* Кнопка копирования */
        .btn-copy {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: #7b2ffc;
            color: white;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-copy:hover:not(:disabled) {
            background: #6a22e0;
            transform: scale(1.01);
            box-shadow: 0 8px 30px rgba(123, 47, 252, 0.25);
        }

        .btn-copy:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-copy:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-copy.copied {
            background: #4ade80;
            color: #0b0e1a;
        }

        .btn-copy .icon {
            font-size: 18px;
        }

        /* Статус */
        .status {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.25);
            min-height: 24px;
            margin-top: 6px;
            transition: 0.2s;
        }

        .status.success {
            color: #4ade80;
        }

        .status.error {
            color: #f87171;
        }

        /* Токен (скрыт) */
        .token-hidden {
            display: none;
        }

        /* Токен-превью */
        .token-preview {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-family: monospace;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            word-break: break-all;
            letter-spacing: 0.3px;
            display: none;
        }

        .token-preview.visible {
            display: block;
        }

        /* Доп. ссылки */
        .links {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 12px;
        }

        .links a {
            color: rgba(255, 255, 255, 0.15);
            text-decoration: none;
            transition: 0.2s;
        }

        .links a:hover {
            color: rgba(255, 255, 255, 0.35);
        }

        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.06);
            letter-spacing: 0.5px;
        }

        .footer span {
            color: rgba(123, 47, 252, 0.3);
        }

        /* Скелетон (загрузка) */
        .skeleton {
            display: inline-block;
            width: 120px;
            height: 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* Мобилка */
        @media (max-width: 460px) {
            .container {
                padding: 32px 20px 24px;
                border-radius: 32px;
            }
            .logo {
                font-size: 36px;
            }
            .btn-copy {
                font-size: 14px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <!-- Логотип -->
        <div class="logo">Ermak X</div>
        <div class="subtitle">Яндекс OAuth 2.0</div>

        <!-- Бейдж -->
        <div class="badge" id="badge">⏳ Ожидание авторизации...</div>

        <!-- Сообщение -->
        <div class="message" id="message">
            Нажмите <strong>«Войти через Яндекс»</strong>, чтобы авторизоваться
        </div>

        <!-- Кнопка входа / копирования -->
        <button class="btn-copy" id="actionBtn" disabled>
            <span class="icon">🔐</span>
            <span id="btnText">Загрузка...</span>
        </button>

        <!-- Статус -->
        <div class="status" id="status">Ожидание токена...</div>

        <!-- Превью токена -->
        <div class="token-preview" id="tokenPreview"></div>

        <!-- Скрытое поле для хранения токена -->
        <div class="token-hidden" id="tokenContainer"></div>

        <!-- Ссылки -->
        <div class="links">
            <a href="#" id="helpLink">❓ Как получить токен?</a>
            <a href="#" id="resetLink">🔄 Сбросить</a>
        </div>

        <div class="footer">© <span>ErmakArtekovec</span></div>
    </div>

    <script>
        (function() {
            'use strict';

            // ——— Конфигурация ———
            const CLIENT_ID = '51c6313a58e74e40a562933c1556f2b5';
            const REDIRECT_URI = 'https://eai-by-ermak.github.io/oauth-callback/';
            const SCOPES = [
                'login:avatar',
                'login:birthday',
                'login:info',
                'login:email',
                'login:phone',
                'cloud_api:disk.app_folder'
            ].join(' ');

            // ——— DOM ———
            const badge = document.getElementById('badge');
            const message = document.getElementById('message');
            const actionBtn = document.getElementById('actionBtn');
            const btnText = document.getElementById('btnText');
            const status = document.getElementById('status');
            const tokenPreview = document.getElementById('tokenPreview');
            const tokenContainer = document.getElementById('tokenContainer');
            const helpLink = document.getElementById('helpLink');
            const resetLink = document.getElementById('resetLink');

            let currentToken = null;

            // ——— Утилиты ———
            function saveToken(token) {
                if (token) {
                    localStorage.setItem('ya_token', token);
                    currentToken = token;
                } else {
                    localStorage.removeItem('ya_token');
                    currentToken = null;
                }
            }

            function getSavedToken() {
                return localStorage.getItem('ya_token');
            }

            function setStatus(text, type) {
                status.textContent = text;
                status.className = 'status' + (type ? ' ' + type : '');
            }

            function setBadge(text, type) {
                badge.textContent = text;
                badge.className = 'badge' + (type ? ' ' + type : '');
            }

            function setMessage(text, isHtml) {
                if (isHtml) {
                    message.innerHTML = text;
                } else {
                    message.textContent = text;
                }
            }

            // ——— Показ токена ———
            function showToken(token) {
                currentToken = token;
                saveToken(token);

                // Показываем превью
                const preview = token.length > 30 ?
                    token.slice(0, 16) + '…' + token.slice(-12) :
                    token;
                tokenPreview.textContent = '🔑 ' + preview;
                tokenPreview.className = 'token-preview visible';

                // Меняем интерфейс
                setBadge('✅ Токен получен', 'success');
                setMessage('Токен скопирован. Вставьте его в приложение Ermak X.', true);

                btnText.textContent = '📋 Скопировать токен';
                actionBtn.disabled = false;
                actionBtn.className = 'btn-copy';

                setStatus('Нажмите, чтобы скопировать токен в буфер обмена', 'success');

                // Сохраняем в скрытый элемент
                tokenContainer.textContent = token;
            }

            // ——— Копирование токена ———
            function copyToken() {
                const token = currentToken || tokenContainer.textContent;
                if (!token) return;

                // Современный способ
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(token)
                        .then(() => {
                            showCopiedFeedback();
                        })
                        .catch(() => {
                            fallbackCopy(token);
                        });
                } else {
                    fallbackCopy(token);
                }
            }

            function showCopiedFeedback() {
                btnText.textContent = '✅ Скопировано!';
                actionBtn.className = 'btn-copy copied';
                setStatus('✅ Токен скопирован в буфер обмена', 'success');
                setTimeout(() => {
                    btnText.textContent = '📋 Скопировать токен';
                    actionBtn.className = 'btn-copy';
                    setStatus('Нажмите, чтобы скопировать токен', 'success');
                }, 3000);
            }

            function fallbackCopy(token) {
                const textarea = document.createElement('textarea');
                textarea.value = token;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                textarea.style.pointerEvents = 'none';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showCopiedFeedback();
                } catch (err) {
                    setStatus('❌ Не удалось скопировать. Выделите токен вручную.', 'error');
                }
                document.body.removeChild(textarea);
            }

            // ——— Сброс ———
            function reset() {
                saveToken(null);
                currentToken = null;
                tokenContainer.textContent = '';
                tokenPreview.className = 'token-preview';
                tokenPreview.textContent = '';

                setBadge('⏳ Ожидание авторизации...', '');
                setMessage('Нажмите <strong>«Войти через Яндекс»</strong>, чтобы авторизоваться', true);
                btnText.textContent = '🔐 Войти через Яндекс';
                actionBtn.disabled = false;
                actionBtn.className = 'btn-copy';
                setStatus('Нажмите кнопку для входа', '');

                // Меняем поведение кнопки на вход
                actionBtn.onclick = startAuth;
            }

            // ——— Авторизация через Яндекс ———
            function startAuth() {
                const authUrl =
                    `https://oauth.yandex.ru/authorize?` +
                    `response_type=token` +
                    `&client_id=${CLIENT_ID}` +
                    `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
                    `&scope=${encodeURIComponent(SCOPES)}`;

                window.location.href = authUrl;
            }

            // ——— Проверка URL (возврат с авторизации) ———
            function checkUrlForToken() {
                const hash = window.location.hash;

                if (hash && hash.includes('access_token')) {
                    const params = new URLSearchParams(hash.substring(1));
                    const token = params.get('access_token');

                    if (token) {
                        // Чистим URL от токена
                        window.history.replaceState(null, '', window.location.pathname);

                        // Показываем токен
                        showToken(token);

                        // Меняем поведение кнопки на копирование
                        actionBtn.onclick = copyToken;
                        return true;
                    }
                }

                // Проверяем параметр token (для отладки)
                const urlParams = new URLSearchParams(window.location.search);
                const tokenParam = urlParams.get('token');
                if (tokenParam) {
                    window.history.replaceState(null, '', window.location.pathname);
                    showToken(tokenParam);
                    actionBtn.onclick = copyToken;
                    return true;
                }

                return false;
            }

            // ——— Помощь ———
            function showHelp(e) {
                e.preventDefault();
                alert(
                    '🔑 КАК ПОЛУЧИТЬ ТОКЕН:\n\n' +
                    '1. Нажмите «Войти через Яндекс»\n' +
                    '2. Авторизуйтесь в своём аккаунте\n' +
                    '3. После авторизации Яндекс перенаправит вас обратно\n' +
                    '4. Токен автоматически появится на этой странице\n' +
                    '5. Нажмите «Скопировать токен»\n' +
                    '6. Вставьте токен в приложение Ermak X\n\n' +
                    '⚠️ Токен даёт доступ к вашим данным. Никому его не показывайте!'
                );
            }

            // ——— Инициализация ———
            function init() {
                // Проверяем URL
                const hasToken = checkUrlForToken();

                // Если токен уже сохранён
                const savedToken = getSavedToken();
                if (savedToken && !hasToken) {
                    showToken(savedToken);
                    actionBtn.onclick = copyToken;
                    return;
                }

                // Если токена нет — показываем кнопку входа
                if (!hasToken && !getSavedToken()) {
                    reset();
                }
            }

            // ——— События ———
            actionBtn.onclick = startAuth;

            helpLink.addEventListener('click', showHelp);

            resetLink.addEventListener('click', (e) => {
                e.preventDefault();
                if (confirm('Сбросить авторизацию и удалить токен?')) {
                    reset();
                }
            });

            // Запускаем
            init();

        })();
    </script>

</body>
</html>
