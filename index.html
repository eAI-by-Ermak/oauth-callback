<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ermak X · Получение токена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0e1a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            padding: 44px 32px 32px;
            background: rgba(18, 22, 34, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .container.success {
            border-color: rgba(0, 174, 0, 0.2);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 174, 0, 0.08);
        }

        .logo {
            font-size: 40px;
            font-weight: 700;
            color: #e8edf5;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            transition: 0.3s;
        }

        .logo span {
            color: #7b8c9e;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .badge {
            display: inline-block;
            padding: 5px 18px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 18px;
            transition: 0.3s;
            letter-spacing: 0.3px;
        }

        .badge.success {
            background: rgba(0, 174, 0, 0.08);
            color: #4ade80;
            border-color: rgba(0, 174, 0, 0.1);
        }

        .badge.waiting {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.15);
            animation: pulseBadge 2s ease-in-out infinite;
        }

        @keyframes pulseBadge {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        .message {
            color: rgba(255, 255, 255, 0.5);
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 22px;
            min-height: 48px;
        }

        .message strong {
            color: rgba(255, 255, 255, 0.75);
            font-weight: 500;
        }

        .message .highlight {
            color: #7b8c9e;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-copy {
            background: rgba(0, 174, 0, 0.08);
            color: #4ade80;
            border-color: rgba(0, 174, 0, 0.08);
        }

        .btn-copy:hover {
            background: rgba(0, 174, 0, 0.12);
            border-color: rgba(0, 174, 0, 0.15);
        }

        .btn-copy.copied {
            background: rgba(200, 40, 40, 0.08);
            color: #f87171;
            border-color: rgba(200, 40, 40, 0.08);
        }

        .btn-copy.copied:hover {
            background: rgba(200, 40, 40, 0.12);
        }

        .btn-copy:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .status {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.12);
            min-height: 20px;
            margin-top: 12px;
            transition: 0.2s;
            letter-spacing: 0.2px;
        }

        .status.success {
            color: #4ade80;
        }

        .status.error {
            color: #f87171;
        }

        .status.info {
            color: rgba(255, 255, 255, 0.25);
        }

        .footer {
            margin-top: 28px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.04);
            letter-spacing: 0.5px;
        }

        .footer span {
            color: rgba(255, 255, 255, 0.06);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(12, 16, 26, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 12px 24px;
            border-radius: 32px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            opacity: 0;
            transition: 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            font-weight: 400;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: rgba(0, 174, 0, 0.08);
            color: #4ade80;
        }

        .toast.error {
            border-color: rgba(200, 40, 40, 0.08);
            color: #f87171;
        }

        @media (max-width: 460px) {
            .container {
                padding: 28px 16px 24px;
                border-radius: 28px;
            }
            .logo {
                font-size: 32px;
            }
            .toast {
                font-size: 12px;
                padding: 10px 16px;
                max-width: 90%;
                bottom: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <div class="container" id="app">
        <div class="logo">Ermak <span>X</span></div>
        <div class="subtitle">Авторизация</div>

        <div class="badge" id="badge">● ожидание</div>

        <div class="message" id="message">
            <span class="highlight">Ожидание</span> токена авторизации
        </div>

        <button class="btn-primary" id="copyBtn" disabled>
            📋 Скопировать токен
        </button>

        <div class="status" id="status">Токен ещё не получен</div>

        <div class="footer">© <span>ErmakArtekovec</span></div>
    </div>

    <script>
        (function() {
            'use strict';

            const toast = document.getElementById('toast');
            const badge = document.getElementById('badge');
            const message = document.getElementById('message');
            const copyBtn = document.getElementById('copyBtn');
            const status = document.getElementById('status');
            const app = document.getElementById('app');

            let currentToken = null;
            let toastTimer = null;

            function setStatus(text, type) {
                status.textContent = text;
                status.className = 'status' + (type ? ' ' + type : '');
            }

            function setBadge(text, type) {
                badge.textContent = text;
                badge.className = 'badge' + (type ? ' ' + type : '');
            }

            function setMessage(text, isHtml) {
                if (isHtml) {
                    message.innerHTML = text;
                } else {
                    message.textContent = text;
                }
            }

            function showToast(text, type, duration) {
                toast.textContent = text;
                toast.className = 'toast show' + (type ? ' ' + type : '');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.className = 'toast';
                }, duration || 3000);
            }

            function storeToken(token) {
                currentToken = token;
                try {
                    sessionStorage.setItem('ermak_token', token);
                } catch (_) {}
            }

            function getStoredToken() {
                try {
                    return sessionStorage.getItem('ermak_token') || null;
                } catch (_) { return null; }
            }

            function clearStoredToken() {
                try {
                    sessionStorage.removeItem('ermak_token');
                } catch (_) {}
                currentToken = null;
            }

            function showTokenReceived() {
                app.classList.add('success');
                setBadge('✓ получен', 'success');
                setMessage('Токен сохранён. Нажмите <strong>«Скопировать токен»</strong>', true);
                setStatus('✅ Токен готов к использованию', 'success');

                copyBtn.disabled = false;
                copyBtn.textContent = '📋 Скопировать токен';
                copyBtn.className = 'btn-primary btn-copy';
                copyBtn.onclick = copyToken;
            }

            function showNoToken() {
                app.classList.remove('success');
                setBadge('● ожидание', 'waiting');
                setMessage('<span class="highlight">Ожидание</span> токена авторизации', true);
                setStatus('Токен ещё не получен', '');

                copyBtn.disabled = true;
                copyBtn.textContent = '📋 Скопировать токен';
                copyBtn.className = 'btn-primary';
                copyBtn.onclick = null;
            }

            function copyToken() {
                const token = currentToken || getStoredToken();
                if (!token) {
                    setStatus('❌ Токен не найден', 'error');
                    showToast('Токен отсутствует', 'error');
                    return;
                }

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(token)
                        .then(() => {
                            copyBtn.textContent = '✓ Скопировано';
                            copyBtn.className = 'btn-primary btn-copy copied';
                            setStatus('✅ Токен скопирован', 'success');
                            showToast('Токен скопирован', 'success');
                            setTimeout(() => {
                                copyBtn.textContent = '📋 Скопировать токен';
                                copyBtn.className = 'btn-primary btn-copy';
                            }, 2500);
                        })
                        .catch(() => fallbackCopy(token));
                } else {
                    fallbackCopy(token);
                }
            }

            function fallbackCopy(token) {
                const textarea = document.createElement('textarea');
                textarea.value = token;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                textarea.style.pointerEvents = 'none';
                textarea.style.userSelect = 'none';
                textarea.style.webkitUserSelect = 'none';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    copyBtn.textContent = '✓ Скопировано';
                    copyBtn.className = 'btn-primary btn-copy copied';
                    setStatus('✅ Токен скопирован', 'success');
                    showToast('Токен скопирован', 'success');
                    setTimeout(() => {
                        copyBtn.textContent = '📋 Скопировать токен';
                        copyBtn.className = 'btn-primary btn-copy';
                    }, 2500);
                } catch (err) {
                    setStatus('❌ Ошибка копирования', 'error');
                    showToast('Не удалось скопировать', 'error');
                }
                document.body.removeChild(textarea);
            }

            function checkUrlForToken() {
                const hash = window.location.hash;
                if (hash && hash.includes('access_token')) {
                    const params = new URLSearchParams(hash.substring(1));
                    const token = params.get('access_token');
                    if (token) {
                        window.history.replaceState(null, '', window.location.pathname);
                        storeToken(token);
                        showTokenReceived();
                        showToast('Авторизация успешна', 'success');
                        return true;
                    }
                }
                return false;
            }

            function init() {
                const hasToken = checkUrlForToken();
                if (!hasToken) {
                    const saved = getStoredToken();
                    if (saved) {
                        currentToken = saved;
                        showTokenReceived();
                        showToast('Токен восстановлен', 'success', 2500);
                    } else {
                        showNoToken();
                    }
                }
            }

            window.addEventListener('focus', () => {
                const hash = window.location.hash;
                if (hash && hash.includes('access_token')) {
                    checkUrlForToken();
                }
            });

            init();

            document.addEventListener('selectstart', function(e) {
                e.preventDefault();
                return false;
            });

            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });

        })();
    </script>

</body>
</html>
