<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ermak X — Вход выполнен</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #030617;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            padding: 40px 32px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 2px solid rgba(123, 47, 252, 0.3);
            box-shadow: 0 0 60px rgba(123, 47, 252, 0.15), inset 0 0 60px rgba(123, 47, 252, 0.05);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50px;
            padding: 2px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                #7b2ffc 15%,
                #a855f7 30%,
                #c084fc 45%,
                #a855f7 60%,
                #7b2ffc 75%,
                transparent 100%
            );
            background-size: 300% 300%;
            animation: borderSpin 6s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: -1;
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes borderSpin {
            0% { --angle: 0deg; }
            100% { --angle: 360deg; }
        }

        .logo {
            font-size: 64px;
            margin-bottom: 16px;
            display: block;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #7b2ffc, #a855f7, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            margin-bottom: 24px;
        }

        .status-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
        }

        .status-icon.success {
            background: rgba(34, 197, 94, 0.15);
            border: 2px solid rgba(34, 197, 94, 0.3);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status-icon.error {
            background: rgba(239, 68, 68, 0.15);
            border: 2px solid rgba(239, 68, 68, 0.3);
        }

        .status-icon.loading {
            background: rgba(123, 47, 252, 0.15);
            border: 2px solid rgba(123, 47, 252, 0.3);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .spinner {
            width: 48px;
            height: 48px;
            margin: 0 auto 20px;
            border: 4px solid rgba(123, 47, 252, 0.15);
            border-top-color: #7b2ffc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .message.success {
            color: #4ade80;
        }

        .message.error {
            color: #f87171;
        }

        .message.info {
            color: rgba(255, 255, 255, 0.6);
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.5px;
        }

        .footer span {
            color: #7b2ffc;
        }

        .close-instruction {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .close-instruction strong {
            color: rgba(255, 255, 255, 0.6);
        }

        .user-info {
            margin: 16px 0;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-info .name {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            font-weight: 500;
        }

        .user-info .email {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="logo">✦</span>

        <div class="title">Ermak X</div>
        <div class="subtitle">Обработка входа</div>

        <!-- Спиннер (по умолчанию) -->
        <div id="spinner" class="spinner"></div>

        <!-- Иконка статуса (скрыта) -->
        <div id="statusIcon" class="status-icon loading" style="display:none;">⏳</div>

        <!-- Сообщение -->
        <div id="message" class="message info">Выполняется вход...</div>

        <!-- Информация о пользователе (скрыта) -->
        <div id="userInfo" class="user-info" style="display:none;">
            <div class="name" id="userName">Имя пользователя</div>
            <div class="email" id="userEmail">email@example.com</div>
        </div>

        <!-- Инструкция для пользователя -->
        <div id="closeInstruction" class="close-instruction" style="display:none;">
            <strong>👆 Закройте это окно</strong><br>
            и вернитесь в приложение
        </div>

        <div class="footer">© <span>ErmakArtekovec</span> 2026</div>
    </div>

    <script>
        // ============================================================
        //  КОНФИГУРАЦИЯ
        // ============================================================
        const CONFIG = {
            google: {
                clientId: '333855238553-aar683rv2uu739o3droba2h510i2o4vb.apps.googleusercontent.com',
                redirectUri: 'https://eai-by-ermak.github.io/oauth-callback/',
                tokenUrl: 'https://oauth2.googleapis.com/token',
                userInfoUrl: 'https://www.googleapis.com/oauth2/v1/userinfo?alt=json'
            },
            yandex: {
                clientId: '51c6313a58e74e40a562933c1556f2b5',
                clientSecret: 'd74265a56cbe4362a0e200a60fb5588a',
                redirectUri: 'https://eai-by-ermak.github.io/oauth-callback/',
                tokenUrl: 'https://oauth.yandex.ru/token',
                userInfoUrl: 'https://login.yandex.ru/info?format=json'
            }
        };

        // ============================================================
        //  DOM ЭЛЕМЕНТЫ
        // ============================================================
        const spinner = document.getElementById('spinner');
        const statusIcon = document.getElementById('statusIcon');
        const messageEl = document.getElementById('message');
        const closeInstruction = document.getElementById('closeInstruction');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');

        // ============================================================
        //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function setStatus(type, msg, user = null) {
            spinner.style.display = 'none';
            statusIcon.style.display = 'flex';

            if (type === 'success') {
                statusIcon.className = 'status-icon success';
                statusIcon.textContent = '✅';
                messageEl.className = 'message success';
                messageEl.textContent = msg || '✅ Вход выполнен успешно!';
                closeInstruction.style.display = 'block';

                if (user) {
                    userInfo.style.display = 'block';
                    userName.textContent = user.name || user.display_name || 'Пользователь';
                    userEmail.textContent = user.email || user.default_email || '';
                }
            } else if (type === 'error') {
                statusIcon.className = 'status-icon error';
                statusIcon.textContent = '❌';
                messageEl.className = 'message error';
                messageEl.textContent = msg || '❌ Ошибка авторизации';
            } else {
                statusIcon.className = 'status-icon loading';
                statusIcon.textContent = '⏳';
                messageEl.className = 'message info';
                messageEl.textContent = msg || 'Выполняется вход...';
            }
        }

        // ============================================================
        //  ОБРАБОТКА ВХОДА
        // ============================================================
        (function() {
            const params = new URLSearchParams(window.location.search);
            const hash = window.location.hash;
            
            // Проверяем параметры для Яндекс (code)
            const yandexCode = params.get('code');
            
            // Проверяем хеш для Google (access_token)
            let googleToken = null;
            let googleUser = null;
            if (hash) {
                const hashParams = new URLSearchParams(hash.substring(1));
                googleToken = hashParams.get('access_token');
            }

            // ============================================================
            //  GOOGLE ВХОД
            // ============================================================
            if (googleToken) {
                setStatus('loading', '⏳ Получение данных пользователя...');

                fetch(CONFIG.google.userInfoUrl, {
                    headers: { 'Authorization': `Bearer ${googleToken}` }
                })
                .then(res => res.json())
                .then(user => {
                    if (user.error) {
                        throw new Error(user.error.message || 'Ошибка получения данных');
                    }

                    // Сохраняем токен и данные
                    localStorage.setItem('google_token', googleToken);
                    localStorage.setItem('google_user', JSON.stringify(user));
                    localStorage.setItem('auth_provider', 'google');

                    setStatus('success', '✅ Вход через Google выполнен!', {
                        name: user.name,
                        email: user.email
                    });
                })
                .catch(err => {
                    setStatus('error', '❌ Ошибка: ' + err.message);
                });
                return;
            }

            // ============================================================
            //  ЯНДЕКС ВХОД (через код)
            // ============================================================
            if (yandexCode) {
                setStatus('loading', '⏳ Обмен кода на токен...');

                fetch(CONFIG.yandex.tokenUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: yandexCode,
                        client_id: CONFIG.yandex.clientId,
                        client_secret: CONFIG.yandex.clientSecret,
                        redirect_uri: CONFIG.yandex.redirectUri
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        throw new Error(data.error_description || 'Ошибка получения токена');
                    }

                    const token = data.access_token;

                    setStatus('loading', '⏳ Получение данных пользователя...');

                    return fetch(CONFIG.yandex.userInfoUrl, {
                        headers: { 'Authorization': `OAuth ${token}` }
                    })
                    .then(res => res.json())
                    .then(user => {
                        if (user.error) {
                            throw new Error(user.error_description || 'Ошибка получения данных');
                        }

                        // Сохраняем токен и данные
                        localStorage.setItem('yandex_token', token);
                        localStorage.setItem('yandex_user', JSON.stringify(user));
                        localStorage.setItem('auth_provider', 'yandex');

                        setStatus('success', '✅ Вход через Яндекс выполнен!', {
                            name: user.display_name || user.real_name || 'Пользователь',
                            email: user.default_email || ''
                        });
                    });
                })
                .catch(err => {
                    setStatus('error', '❌ Ошибка: ' + err.message);
                });
                return;
            }

            // ============================================================
            //  ЕСЛИ НЕТ ПАРАМЕТРОВ
            // ============================================================
            setStatus('error', '❌ Нет параметров авторизации');
        })();
    </script>
</body>
</html>
