<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ermak X — Токен получен</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #030617;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            padding: 40px 28px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 2px solid rgba(123, 47, 252, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50px;
            padding: 2px;
            background: conic-gradient(from var(--angle, 0deg), transparent 0%, #7b2ffc 15%, #a855f7 30%, #c084fc 45%, #a855f7 60%, #7b2ffc 75%, transparent 100%);
            background-size: 300% 300%;
            animation: borderSpin 6s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: -1;
        }
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }
        @keyframes borderSpin {
            0% {
                --angle: 0deg;
            }
            100% {
                --angle: 360deg;
            }
        }

        .check-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            position: relative;
        }
        .check-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(52, 152, 219, 0.12);
            border: 3px solid rgba(52, 152, 219, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: circlePulse 2s ease-in-out infinite;
        }
        .check-circle::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #3498db;
            border-right-color: #3498db;
            animation: spinArc 1.8s linear infinite;
        }
        .check-circle::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-bottom-color: rgba(52, 152, 219, 0.4);
            border-left-color: rgba(52, 152, 219, 0.4);
            animation: spinArcReverse 2.2s linear infinite;
        }
        @keyframes spinArc {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        @keyframes spinArcReverse {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(-360deg);
            }
        }
        @keyframes circlePulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.02);
                opacity: 0.9;
            }
        }

        .check-icon {
            font-size: 36px;
            color: #3498db;
            animation: checkBounce 0.6s ease-out;
            z-index: 1;
            position: relative;
            line-height: 1;
            font-weight: 700;
        }
        @keyframes checkBounce {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.3);
                opacity: 1;
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1);
            }
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, #7b2ffc, #a855f7, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .provider-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .provider-badge.google {
            background: #ea4335;
            color: white;
        }
        .provider-badge.yandex {
            background: #fc3f1d;
            color: white;
        }

        .success-msg {
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-copy {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            background: #7b2ffc;
            color: white;
            margin-bottom: 8px;
        }
        .btn-copy:active {
            opacity: 0.7;
            transform: scale(0.98);
        }
        .btn-copy.copied {
            background: #3498db;
        }

        .status-msg {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            min-height: 24px;
            margin-top: 4px;
        }

        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 0.5px;
        }
        .footer span {
            color: rgba(123, 47, 252, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="check-wrapper">
            <div class="check-circle">
                <span class="check-icon">✓</span>
            </div>
        </div>

        <div class="title">Ermak X</div>
        <div class="subtitle">Авторизация</div>

        <div id="providerBadge" class="provider-badge">⏳ Загрузка...</div>

        <div class="success-msg" id="successMsg">
            Вы успешно вошли с аккаунтом <span id="providerName">Google</span>
        </div>

        <button class="btn-copy" id="copyBtn">📋 Скопировать токен</button>
        <div class="status-msg" id="statusMsg">Нажмите, чтобы скопировать токен</div>

        <div class="footer">© <span>ErmakArtekovec</span></div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const hash = window.location.hash;

            const providerBadge = document.getElementById('providerBadge');
            const providerName = document.getElementById('providerName');
            const successMsg = document.getElementById('successMsg');
            const copyBtn = document.getElementById('copyBtn');
            const statusMsg = document.getElementById('statusMsg');

            let token = null;
            let provider = '';

            if (hash && hash.includes('access_token')) {
                const hashParams = new URLSearchParams(hash.substring(1));
                token = hashParams.get('access_token');
                provider = 'Google';
                providerBadge.textContent = '✅ Google';
                providerBadge.className = 'provider-badge google';
                providerName.textContent = 'Google';
            }

            const yandexCode = params.get('code');
            if (yandexCode && !token) {
                providerBadge.textContent = '⏳ Получение...';
                providerBadge.className = 'provider-badge';

                fetch('https://oauth.yandex.ru/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: yandexCode,
                        client_id: '51c6313a58e74e40a562933c1556f2b5',
                        client_secret: 'd74265a56cbe4362a0e200a60fb5588a',
                        redirect_uri: 'https://eai-by-ermak.github.io/oauth-callback/'
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.access_token) {
                        token = data.access_token;
                        provider = 'Яндекс';
                        providerBadge.textContent = '✅ Яндекс';
                        providerBadge.className = 'provider-badge yandex';
                        providerName.textContent = 'Яндекс';
                    } else {
                        providerBadge.textContent = '❌ Ошибка';
                        statusMsg.textContent = 'Ошибка получения токена';
                    }
                })
                .catch(err => {
                    providerBadge.textContent = '❌ Ошибка';
                    statusMsg.textContent = 'Ошибка: ' + err.message;
                });
            }

            if (token) {
                copyBtn.addEventListener('click', function() {
                    navigator.clipboard.writeText(token).then(() => {
                        copyBtn.textContent = '✅ Скопировано!';
                        copyBtn.classList.add('copied');
                        statusMsg.textContent = 'Токен скопирован в буфер обмена';
                        setTimeout(() => {
                            copyBtn.textContent = '📋 Скопировать токен';
                            copyBtn.classList.remove('copied');
                            statusMsg.textContent = 'Нажмите, чтобы скопировать токен';
                        }, 3000);
                    }).catch(() => {
                        const textarea = document.createElement('textarea');
                        textarea.value = token;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        copyBtn.textContent = '✅ Скопировано!';
                        copyBtn.classList.add('copied');
                        statusMsg.textContent = 'Токен скопирован в буфер обмена';
                        setTimeout(() => {
                            copyBtn.textContent = '📋 Скопировать токен';
                            copyBtn.classList.remove('copied');
                            statusMsg.textContent = 'Нажмите, чтобы скопировать токен';
                        }, 3000);
                    });
                });
            } else {
                copyBtn.disabled = true;
                copyBtn.style.opacity = '0.4';
                copyBtn.textContent = '⏳ Ожидание токена...';
                statusMsg.textContent = 'Токен ещё не получен';
            }
        })();
    </script>
</body>
</html>
