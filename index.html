<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ermak X — Вход выполнен</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #030617;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            padding: 40px 32px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 2px solid rgba(123,47,252,0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50px;
            padding: 2px;
            background: conic-gradient(from var(--angle,0deg), transparent 0%, #7b2ffc 15%, #a855f7 30%, #c084fc 45%, #a855f7 60%, #7b2ffc 75%, transparent 100%);
            background-size: 300% 300%;
            animation: borderSpin 6s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: -1;
        }
        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes borderSpin { 0% { --angle: 0deg; } 100% { --angle: 360deg; } }
        .logo { font-size: 64px; margin-bottom: 16px; display: block; }
        .title { font-size: 28px; font-weight: 700; background: linear-gradient(90deg, #7b2ffc, #a855f7, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.6); font-size: 16px; margin-bottom: 24px; }
        .status-icon { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 36px; background: rgba(34,197,94,0.15); border: 2px solid rgba(34,197,94,0.3); animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
        .spinner { width: 48px; height: 48px; margin: 0 auto 20px; border: 4px solid rgba(123,47,252,0.15); border-top-color: #7b2ffc; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message { color: rgba(255,255,255,0.8); font-size: 15px; line-height: 1.5; margin-bottom: 8px; }
        .message.success { color: #4ade80; }
        .message.error { color: #f87171; }
        .footer { margin-top: 24px; font-size: 12px; color: rgba(255,255,255,0.25); }
        .footer span { color: #7b2ffc; }
        .close-instruction { color: rgba(255,255,255,0.4); font-size: 13px; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.05); }
        .close-instruction strong { color: rgba(255,255,255,0.6); }
    </style>
</head>
<body>
    <div class="container">
        <span class="logo">✦</span>
        <div class="title">Ermak X</div>
        <div class="subtitle">Обработка входа</div>
        <div id="statusIcon" class="status-icon">✅</div>
        <div id="message" class="message success">Вход выполнен успешно!</div>
        <div class="close-instruction">
            <strong>👆 Закройте это окно</strong><br>
            и вернитесь в приложение
        </div>
        <div class="footer">© <span>ErmakArtekovec</span> 2026</div>
    </div>

    <script>
        (function() {
            const messageEl = document.getElementById('message');
            const statusIcon = document.getElementById('statusIcon');

            // Получаем параметры из URL
            const params = new URLSearchParams(window.location.search);
            const hash = window.location.hash;

            // 1. Google OAuth (токен в hash)
            if (hash && hash.includes('access_token')) {
                const hashParams = new URLSearchParams(hash.substring(1));
                const token = hashParams.get('access_token');
                if (token) {
                    localStorage.setItem('google_token', token);
                    messageEl.textContent = '✅ Вход через Google выполнен!';
                    messageEl.className = 'message success';
                    statusIcon.className = 'status-icon';
                    statusIcon.textContent = '✅';
                } else {
                    messageEl.textContent = '❌ Токен не найден';
                    messageEl.className = 'message error';
                    statusIcon.className = 'status-icon';
                    statusIcon.textContent = '❌';
                }
                return;
            }

            // 2. Яндекс OAuth (код в параметрах)
            const yandexCode = params.get('code');
            if (yandexCode) {
                messageEl.textContent = '⏳ Обмен кода на токен...';
                messageEl.className = 'message';
                statusIcon.className = 'status-icon';
                statusIcon.textContent = '⏳';

                // Обмениваем код на токен
                fetch('https://oauth.yandex.ru/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: yandexCode,
                        client_id: '51c6313a58e74e40a562933c1556f2b5',
                        client_secret: 'd74265a56cbe4362a0e200a60fb5588a',
                        redirect_uri: 'https://eai-by-ermak.github.io/oauth-callback/'
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.access_token) {
                        const token = data.access_token;
                        localStorage.setItem('yandex_token', token);
                        messageEl.textContent = '✅ Вход через Яндекс выполнен!';
                        messageEl.className = 'message success';
                        statusIcon.className = 'status-icon';
                        statusIcon.textContent = '✅';

                        // Получаем данные пользователя
                        return fetch('https://login.yandex.ru/info?format=json', {
                            headers: { 'Authorization': `OAuth ${token}` }
                        })
                        .then(res => res.json())
                        .then(user => {
                            localStorage.setItem('yandex_user', JSON.stringify(user));
                            // НЕ ПЕРЕНАПРАВЛЯЕМ! Оставляем страницу
                        });
                    } else {
                        throw new Error(data.error_description || 'Ошибка получения токена');
                    }
                })
                .catch(err => {
                    messageEl.textContent = '❌ Ошибка: ' + err.message;
                    messageEl.className = 'message error';
                    statusIcon.className = 'status-icon';
                    statusIcon.textContent = '❌';
                });
                return;
            }

            // 3. Если ничего нет
            messageEl.textContent = '❌ Нет параметров авторизации';
            messageEl.className = 'message error';
            statusIcon.className = 'status-icon';
            statusIcon.textContent = '❌';
        })();
    </script>
</body>
</html>
