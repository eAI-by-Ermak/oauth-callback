<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ermak X — Вход выполнен</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #030617;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            padding: 40px 32px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 2px solid rgba(123,47,252,0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50px;
            padding: 2px;
            background: conic-gradient(from var(--angle,0deg), transparent 0%, #7b2ffc 15%, #a855f7 30%, #c084fc 45%, #a855f7 60%, #7b2ffc 75%, transparent 100%);
            background-size: 300% 300%;
            animation: borderSpin 6s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: -1;
        }
        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes borderSpin { 0% { --angle: 0deg; } 100% { --angle: 360deg; } }
        .logo { font-size: 64px; margin-bottom: 16px; display: block; }
        .title { font-size: 28px; font-weight: 700; background: linear-gradient(90deg, #7b2ffc, #a855f7, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.6); font-size: 16px; margin-bottom: 24px; }
        .status-icon { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 36px; background: rgba(34,197,94,0.15); border: 2px solid rgba(34,197,94,0.3); animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
        .spinner { width: 48px; height: 48px; margin: 0 auto 20px; border: 4px solid rgba(123,47,252,0.15); border-top-color: #7b2ffc; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message { color: rgba(255,255,255,0.8); font-size: 15px; line-height: 1.5; margin-bottom: 8px; }
        .message.success { color: #4ade80; }
        .message.error { color: #f87171; }
        .message.info { color: rgba(255,255,255,0.6); }
        .footer { margin-top: 24px; font-size: 12px; color: rgba(255,255,255,0.25); }
        .footer span { color: #7b2ffc; }
        .close-instruction { color: rgba(255,255,255,0.4); font-size: 13px; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.05); }
        .close-instruction strong { color: rgba(255,255,255,0.6); }
        .user-info { margin-top: 12px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; font-size: 13px; color: rgba(255,255,255,0.7); text-align: left; }
        .user-info .label { color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div class="container">
        <span class="logo">✦</span>
        <div class="title">Ermak X</div>
        <div class="subtitle">Обработка входа</div>
        <div id="statusIcon" class="status-icon">✅</div>
        <div id="message" class="message success">Вход выполнен успешно!</div>
        <div id="userInfo" class="user-info" style="display:none;"></div>
        <div class="close-instruction">
            <strong>👆 Закройте это окно</strong><br>
            и вернитесь в приложение
        </div>
        <div class="footer">© <span>ErmakArtekovec</span> 2026</div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const hash = window.location.hash;
            const appUrl = 'https://eai-by-ermak.github.io/Ermak-X/';
            const messageEl = document.getElementById('message');
            const statusIcon = document.getElementById('statusIcon');
            const userInfoEl = document.getElementById('userInfo');

            function setStatus(type, msg) {
                messageEl.textContent = msg;
                messageEl.className = 'message ' + type;
                if (type === 'success') {
                    statusIcon.className = 'status-icon';
                    statusIcon.textContent = '✅';
                } else if (type === 'error') {
                    statusIcon.className = 'status-icon';
                    statusIcon.textContent = '❌';
                } else {
                    statusIcon.className = 'spinner';
                    statusIcon.textContent = '';
                }
            }

            function showUserInfo(user, provider) {
                userInfoEl.style.display = 'block';
                const name = user.display_name || user.real_name || user.name || 'Пользователь';
                const email = user.default_email || user.email || '';
                userInfoEl.innerHTML = `
                    <div><span class="label">Провайдер:</span> ${provider}</div>
                    <div><span class="label">Имя:</span> ${name}</div>
                    ${email ? `<div><span class="label">Email:</span> ${email}</div>` : ''}
                    ${user.birthday ? `<div><span class="label">Дата рождения:</span> ${user.birthday}</div>` : ''}
                    ${user.sex ? `<div><span class="label">Пол:</span> ${user.sex === 'male' ? 'Мужской' : user.sex === 'female' ? 'Женский' : user.sex}</div>` : ''}
                    ${user.default_phone ? `<div><span class="label">Телефон:</span> ${user.default_phone}</div>` : ''}
                `;
            }

            // ============================================================
            //  GOOGLE OAuth (токен в hash)
            // ============================================================
            if (hash && hash.includes('access_token')) {
                const hashParams = new URLSearchParams(hash.substring(1));
                const token = hashParams.get('access_token');
                if (token) {
                    setStatus('success', '✅ Вход через Google выполнен!');
                    // Перенаправляем в приложение с токеном
                    window.location.href = appUrl + '?token=' + token;
                } else {
                    setStatus('error', '❌ Токен не найден');
                }
                return;
            }

            // ============================================================
            //  ЯНДЕКС OAuth (код в параметрах)
            // ============================================================
            const yandexCode = params.get('code');
            if (yandexCode) {
                setStatus('info', '⏳ Обмен кода на токен...');

                fetch('https://oauth.yandex.ru/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: yandexCode,
                        client_id: '51c6313a58e74e40a562933c1556f2b5',
                        client_secret: 'd74265a56cbe4362a0e200a60fb5588a',
                        redirect_uri: 'https://eai-by-ermak.github.io/oauth-callback/'
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.access_token) {
                        const token = data.access_token;
                        setStatus('info', '⏳ Получение данных пользователя...');
                        return fetch('https://login.yandex.ru/info?format=json', {
                            headers: { 'Authorization': `OAuth ${token}` }
                        })
                        .then(res => res.json())
                        .then(user => {
                            showUserInfo(user, 'Яндекс');
                            const userData = encodeURIComponent(JSON.stringify(user));
                            setStatus('success', '✅ Вход через Яндекс выполнен!');
                            // Перенаправляем в приложение с токеном и данными
                            window.location.href = appUrl + '?token=' + token + '&user=' + userData;
                        });
                    }
                    throw new Error('Ошибка получения токена');
                })
                .catch(err => {
                    setStatus('error', '❌ Ошибка: ' + err.message);
                });
                return;
            }

            // ============================================================
            //  ЕСЛИ НИЧЕГО НЕТ
            // ============================================================
            setStatus('error', '❌ Нет параметров авторизации');
        })();
    </script>
</body>
</html>
