<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ermak X — Вход выполнен</title>
    <style>
        /* ... твои стили ... (оставь как есть) */
    </style>
</head>
<body>

    <div class="container">
        <span class="logo">✦</span>
        <div class="title">Ermak X</div>
        <div class="subtitle">Обработка входа</div>

        <div id="statusIcon" class="status-icon" style="display:none;">✅</div>
        <div id="spinner" class="spinner"></div>
        <div id="message" class="message info">Выполняется вход...</div>
        <div id="closeInstruction" class="close-instruction" style="display:none;">
            <strong>👆 Закройте это окно</strong><br>
            и вернитесь в приложение
        </div>
        <div class="footer">© <span>ErmakArtekovec</span> 2026</div>
    </div>

    <script>
        // ============================================================
        //  КОНФИГУРАЦИЯ (убедись, что clientId правильный!)
        // ============================================================
        const CONFIG = {
            google: {
                clientId: '333855238553-aar683rv2uu739o3droba2h510i2o4vb.apps.googleusercontent.com',
                redirectUri: 'https://eai-by-ermak.github.io/oauth-callback/'
            },
            yandex: {
                clientId: '51c6313a58e74e40a562933c1556f2b5',
                redirectUri: 'https://eai-by-ermak.github.io/oauth-callback/'
            }
        };

        // ============================================================
        //  DOM ЭЛЕМЕНТЫ
        // ============================================================
        const spinner = document.getElementById('spinner');
        const statusIcon = document.getElementById('statusIcon');
        const messageEl = document.getElementById('message');
        const closeInstruction = document.getElementById('closeInstruction');

        function setStatus(type, msg) {
            spinner.style.display = 'none';
            statusIcon.style.display = 'flex';

            if (type === 'success') {
                statusIcon.className = 'status-icon success';
                statusIcon.textContent = '✅';
                messageEl.className = 'message success';
                messageEl.textContent = msg;
                closeInstruction.style.display = 'block';
            } else if (type === 'error') {
                statusIcon.className = 'status-icon error';
                statusIcon.textContent = '❌';
                messageEl.className = 'message error';
                messageEl.textContent = msg;
            } else {
                statusIcon.className = 'status-icon loading';
                statusIcon.textContent = '⏳';
                messageEl.className = 'message info';
                messageEl.textContent = msg;
            }
        }

        // ============================================================
        //  ОСНОВНАЯ ЛОГИКА
        // ============================================================
        (function() {
            const params = new URLSearchParams(window.location.search);
            const hash = window.location.hash;
            
            // 1. Проверяем Google (токен в hash)
            if (hash && hash.includes('access_token')) {
                const hashParams = new URLSearchParams(hash.substring(1));
                const token = hashParams.get('access_token');
                
                if (token) {
                    // ✅ Сохраняем токен
                    localStorage.setItem('google_token', token);
                    setStatus('success', '✅ Вход через Google выполнен!');
                    console.log('✅ Google токен сохранён');
                } else {
                    setStatus('error', '❌ Токен Google не найден в URL');
                }
                return;
            }

            // 2. Проверяем Яндекс (код в параметрах)
            const yandexCode = params.get('code');
            if (yandexCode) {
                setStatus('loading', '⏳ Обмен кода на токен...');
                
                fetch('https://oauth.yandex.ru/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: yandexCode,
                        client_id: CONFIG.yandex.clientId,
                        client_secret: 'd74265a56cbe4362a0e200a60fb5588a',
                        redirect_uri: CONFIG.yandex.redirectUri
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.access_token) {
                        localStorage.setItem('yandex_token', data.access_token);
                        setStatus('success', '✅ Вход через Яндекс выполнен!');
                        console.log('✅ Яндекс токен сохранён');
                    } else {
                        setStatus('error', '❌ Ошибка получения токена Яндекса');
                    }
                })
                .catch(err => {
                    setStatus('error', '❌ Ошибка: ' + err.message);
                });
                return;
            }

            // 3. Если ничего нет
            setStatus('error', '❌ Нет параметров авторизации');
        })();
    </script>
</body>
</html>
