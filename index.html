<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ermak X — Получение токена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0e1a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 440px;
            width: 100%;
            padding: 44px 32px 32px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(123, 47, 252, 0.2);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .container::before {
            content: '';
            position: absolute;
            inset: -1.5px;
            border-radius: 50px;
            padding: 2px;
            background: conic-gradient(from var(--angle, 0deg),
                    transparent 0%,
                    #7b2ffc 20%,
                    #a855f7 40%,
                    #c084fc 60%,
                    #a855f7 80%,
                    #7b2ffc 100%,
                    transparent 100%);
            background-size: 300% 300%;
            animation: borderSpin 8s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: -1;
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes borderSpin {
            0% {
                --angle: 0deg;
            }
            100% {
                --angle: 360deg;
            }
        }

        .logo {
            font-size: 44px;
            font-weight: 800;
            background: linear-gradient(135deg, #7b2ffc, #a855f7, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
            margin-bottom: 28px;
        }

        .badge {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.3s;
        }

        .badge.success {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.15);
        }

        .badge.waiting {
            background: rgba(252, 63, 29, 0.1);
            color: #fc3f1d;
            border-color: rgba(252, 63, 29, 0.1);
            animation: pulseBadge 1.5s ease-in-out infinite;
        }

        @keyframes pulseBadge {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .message {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 22px;
            min-height: 52px;
        }

        .message strong {
            color: #fff;
            font-weight: 600;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-yandex {
            background: #fc3f1d;
            color: #fff;
        }

        .btn-yandex:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 30px rgba(252, 63, 29, 0.25);
        }

        .btn-yandex svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .btn-copy {
            background: #4ade80;
            color: #0b0e1a;
        }

        .btn-copy:hover {
            background: #3bca6e;
            box-shadow: 0 8px 30px rgba(74, 222, 128, 0.2);
        }

        .btn-copy.copied {
            background: #34d399;
        }

        .status {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.2);
            min-height: 22px;
            margin-top: 12px;
            transition: 0.2s;
        }

        .status.success {
            color: #4ade80;
        }

        .status.error {
            color: #f87171;
        }

        .status.info {
            color: #60a5fa;
        }

        .token-box {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-family: monospace;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            word-break: break-all;
            letter-spacing: 0.3px;
            display: none;
            text-align: left;
        }

        .token-box.visible {
            display: block;
        }

        .token-box .label {
            color: rgba(255, 255, 255, 0.15);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .token-box .token-value {
            color: #a78bfa;
            font-size: 13px;
        }

        .links {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 12px;
        }

        .links a {
            color: rgba(255, 255, 255, 0.1);
            text-decoration: none;
            transition: 0.2s;
            cursor: pointer;
        }

        .links a:hover {
            color: rgba(255, 255, 255, 0.3);
        }

        .footer {
            margin-top: 22px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.04);
            letter-spacing: 0.5px;
        }

        .footer span {
            color: rgba(123, 47, 252, 0.2);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(123, 47, 252, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(123, 47, 252, 0.2);
            padding: 14px 28px;
            border-radius: 40px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            opacity: 0;
            transition: 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            font-weight: 500;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 460px) {
            .container {
                padding: 28px 16px 24px;
                border-radius: 32px;
            }
            .logo {
                font-size: 34px;
            }
            .toast {
                font-size: 12px;
                padding: 10px 18px;
                max-width: 90%;
                bottom: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast">🔄 Авторизация открыта в новой вкладке</div>

    <div class="container" id="app">

        <div class="logo">Ermak X</div>
        <div class="subtitle">Получение токена</div>

        <div class="badge" id="badge">⏳ Ожидание</div>

        <div class="message" id="message">
            Нажмите <strong>«Войти через Яндекс»</strong> для получения токена
        </div>

        <button class="btn-primary btn-yandex" id="loginBtn">
            <svg viewBox="0 0 24 24" fill="white">
                <path d="M11.97 0C5.36 0 0 5.36 0 12c0 6.64 5.36 12 11.97 12 6.61 0 11.97-5.36 11.97-12C23.94 5.36 18.58 0 11.97 0zm-.48 17.76h-2.8V6.24h2.8v11.52zm8.2-11.52v11.52h-2.8V6.24h2.8z"/>
            </svg>
            Войти через Яндекс
        </button>

        <div class="status" id="status">Нажмите кнопку для авторизации</div>

        <div class="token-box" id="tokenBox">
            <div class="label">🔑 Ваш токен</div>
            <div class="token-value" id="tokenValue"></div>
        </div>

        <div class="links">
            <a id="resetLink">🔄 Сбросить</a>
        </div>

        <div class="footer">© <span>ErmakArtekovec</span></div>
    </div>

    <script>
        (function() {
            'use strict';

            // ═══════════════════════════════════════════
            //  🔑 НОВЫЙ CLIENT ID
            //  ✅ redirect_uri = ЭТА ЖЕ СТРАНИЦА (никуда не уходим)
            // ═══════════════════════════════════════════
            const CLIENT_ID = '834edc54f2be4ea0ae277ac3013d2e91';

            // ⚠️ ВАЖНО: redirect_uri = текущий URL (эта страница)
            // Яндекс перенаправит обратно сюда с токеном в #hash
            const REDIRECT_URI = window.location.href.split('#')[0];

            const SCOPES = [
                'login:avatar',
                'login:birthday',
                'login:info',
                'login:email',
                'login:default_phone',
                'cloud_api:disk.app_folder'
            ].join(' ');

            // ——— DOM ———
            const badge = document.getElementById('badge');
            const message = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');
            const status = document.getElementById('status');
            const tokenBox = document.getElementById('tokenBox');
            const tokenValue = document.getElementById('tokenValue');
            const resetLink = document.getElementById('resetLink');
            const toast = document.getElementById('toast');

            let currentToken = null;
            let toastTimer = null;

            function setStatus(text, type) {
                status.textContent = text;
                status.className = 'status' + (type ? ' ' + type : '');
            }

            function setBadge(text, type) {
                badge.textContent = text;
                badge.className = 'badge' + (type ? ' ' + type : '');
            }

            function setMessage(text, isHtml) {
                if (isHtml) {
                    message.innerHTML = text;
                } else {
                    message.textContent = text;
                }
            }

            function showToast(text, duration) {
                toast.textContent = text;
                toast.className = 'toast show';
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.className = 'toast';
                }, duration || 4000);
            }

            function showToken(token) {
                currentToken = token;

                // Показываем токен
                tokenValue.textContent = token;
                tokenBox.className = 'token-box visible';

                setBadge('✅ Токен получен', 'success');
                setMessage('Токен скопирован в буфер обмена. Вставьте его в приложение.', true);
                setStatus('✅ Токен готов к использованию', 'success');

                // Меняем кнопку на копирование
                loginBtn.innerHTML = '📋 Скопировать токен';
                loginBtn.className = 'btn-primary btn-copy';
                loginBtn.onclick = copyToken;

                // Автоматически копируем в буфер
                copyToken();
            }

            function copyToken() {
                const token = currentToken;
                if (!token) return;

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(token)
                        .then(() => {
                            loginBtn.textContent = '✅ Скопировано!';
                            loginBtn.className = 'btn-primary btn-copy copied';
                            setStatus('✅ Токен скопирован в буфер обмена', 'success');
                            showToast('✅ Токен скопирован!', 2500);
                            setTimeout(() => {
                                loginBtn.textContent = '📋 Скопировать токен';
                                loginBtn.className = 'btn-primary btn-copy';
                            }, 2500);
                        })
                        .catch(() => fallbackCopy(token));
                } else {
                    fallbackCopy(token);
                }
            }

            function fallbackCopy(token) {
                const textarea = document.createElement('textarea');
                textarea.value = token;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                textarea.style.pointerEvents = 'none';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    loginBtn.textContent = '✅ Скопировано!';
                    loginBtn.className = 'btn-primary btn-copy copied';
                    setStatus('✅ Токен скопирован в буфер обмена', 'success');
                    showToast('✅ Токен скопирован!', 2500);
                    setTimeout(() => {
                        loginBtn.textContent = '📋 Скопировать токен';
                        loginBtn.className = 'btn-primary btn-copy';
                    }, 2500);
                } catch (err) {
                    setStatus('❌ Не удалось скопировать. Выделите токен вручную.', 'error');
                }
                document.body.removeChild(textarea);
            }

            // ——— Авторизация через Яндекс (новая вкладка) ———
            function startAuth() {
                const authUrl =
                    `https://oauth.yandex.ru/authorize?` +
                    `response_type=token` +
                    `&client_id=${CLIENT_ID}` +
                    `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
                    `&scope=${encodeURIComponent(SCOPES)}`;

                const popup = window.open(authUrl, '_blank');

                if (popup) {
                    showToast('🔄 Авторизация открыта в новой вкладке', 4000);
                    setStatus('⏳ Ожидайте завершения авторизации...', 'info');
                    setBadge('⏳ Ожидание', 'waiting');
                } else {
                    showToast('⚠️ Разрешите всплывающие окна', 4000);
                    window.location.href = authUrl;
                }
            }

            // ——— Проверка URL (возврат с авторизации на ЭТУ ЖЕ страницу) ———
            function checkUrlForToken() {
                const hash = window.location.hash;

                if (hash && hash.includes('access_token')) {
                    const params = new URLSearchParams(hash.substring(1));
                    const token = params.get('access_token');

                    if (token) {
                        // Очищаем URL от токена (чтобы не светился)
                        window.history.replaceState(null, '', window.location.pathname + window.location.search);
                        showToken(token);
                        showToast('✅ Авторизация успешна!', 3000);
                        return true;
                    }
                }

                // Для отладки: можно передать token в параметре
                const urlParams = new URLSearchParams(window.location.search);
                const tokenParam = urlParams.get('token');
                if (tokenParam) {
                    window.history.replaceState(null, '', window.location.pathname);
                    showToken(tokenParam);
                    return true;
                }

                return false;
            }

            // ——— Сброс ———
            function reset() {
                if (!confirm('Сбросить токен?')) return;

                currentToken = null;
                tokenBox.className = 'token-box';
                tokenValue.textContent = '';

                setBadge('⏳ Ожидание', '');
                setMessage('Нажмите <strong>«Войти через Яндекс»</strong> для получения токена', true);
                setStatus('Нажмите кнопку для авторизации', '');

                loginBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="white" style="width:20px;height:20px;flex-shrink:0;">
                        <path d="M11.97 0C5.36 0 0 5.36 0 12c0 6.64 5.36 12 11.97 12 6.61 0 11.97-5.36 11.97-12C23.94 5.36 18.58 0 11.97 0zm-.48 17.76h-2.8V6.24h2.8v11.52zm8.2-11.52v11.52h-2.8V6.24h2.8z"/>
                    </svg>
                    Войти через Яндекс
                `;
                loginBtn.className = 'btn-primary btn-yandex';
                loginBtn.onclick = startAuth;
            }

            // ——— Инициализация ———
            function init() {
                // Проверяем URL (возврат с авторизации)
                const hasToken = checkUrlForToken();

                // Если токена нет — показываем кнопку входа
                if (!hasToken) {
                    reset();
                }
            }

            // ——— События ———
            loginBtn.addEventListener('click', startAuth);
            resetLink.addEventListener('click', reset);

            // При фокусе на вкладке проверяем URL (если вернулись с авторизации)
            window.addEventListener('focus', () => {
                const hash = window.location.hash;
                if (hash && hash.includes('access_token')) {
                    checkUrlForToken();
                }
            });

            init();

        })();
    </script>

</body>
</html>
